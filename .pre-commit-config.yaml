#
# Pre-commit hooks for devlore-cli
#
# Install: pre-commit install
# Run manually: pre-commit run --all-files
#
# Requires: go, golangci-lint

repos:
  - repo: local
    hooks:
      - id: go-mod-tidy
        name: Tidy Go modules
        entry: bash -c 'go mod tidy && git diff --exit-code go.mod go.sum'
        language: system
        pass_filenames: false
        types: [go]

      - id: go-fmt
        name: Format Go code
        entry: go fmt ./...
        language: system
        pass_filenames: false
        types: [go]

      - id: go-vet
        name: Vet Go code
        entry: go vet ./...
        language: system
        pass_filenames: false
        types: [go]

      - id: golangci-lint
        name: Lint Go code
        entry: golangci-lint run
        language: system
        pass_filenames: false
        types: [go]

      - id: gocyclo
        name: Check cyclomatic complexity
        entry: bash -c 'go install github.com/fzipp/gocyclo/cmd/gocyclo@latest && VIOLATIONS=$(gocyclo -over 19 . | grep -v "_test.go" || true); if [ -n "$VIOLATIONS" ]; then echo "ERROR: Functions with complexity > 19:"; echo "$VIOLATIONS"; exit 1; fi'
        language: system
        pass_filenames: false
        types: [go]

      - id: guide-frontmatter
        name: Validate guide frontmatter
        entry: scripts/Test-GuideFrontmatter.sh
        language: script
        files: ^docs/guides/.*\.md$
        pass_filenames: false
