#
# Pre-commit hooks for devlore-cli
#
# Install: pre-commit install
# Run manually: pre-commit run --all-files
#
# Requires: go, golangci-lint

repos:
  - repo: local
    hooks:
      - id: go-mod-tidy
        name: Tidy Go modules
        entry: go mod tidy
        language: system
        pass_filenames: false
        types: [go]

      - id: go-fmt
        name: Format Go code
        entry: go fmt ./...
        language: system
        pass_filenames: false
        types: [go]

      - id: go-vet
        name: Vet Go code
        entry: go vet ./...
        language: system
        pass_filenames: false
        types: [go]

      - id: golangci-lint
        name: Lint Go code
        entry: golangci-lint run
        language: system
        pass_filenames: false
        types: [go]

      - id: guide-frontmatter
        name: Validate guide frontmatter
        entry: scripts/Test-GuideFrontmatter.sh
        language: script
        files: ^docs/guides/.*\.md$
        pass_filenames: false
