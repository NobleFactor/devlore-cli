# GoReleaser configuration for devlore-cli
# https://goreleaser.com

version: 2

project_name: devlore-cli

before:
  hooks:
    - go mod tidy

after:
  hooks:
    - ./packaging/macports/generate-portfile.sh {{ .Version }}

builds:
  - id: writ
    binary: writ
    main: ./cmd/writ
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/NobleFactor/devlore-cli/internal/cli.Version={{.Version}}
      - -X github.com/NobleFactor/devlore-cli/internal/cli.Commit={{.ShortCommit}}
      - -X github.com/NobleFactor/devlore-cli/internal/cli.BuildDate={{.Date}}

  - id: lore
    binary: lore
    main: ./cmd/lore
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/NobleFactor/devlore-cli/internal/cli.Version={{.Version}}
      - -X github.com/NobleFactor/devlore-cli/internal/cli.Commit={{.ShortCommit}}
      - -X github.com/NobleFactor/devlore-cli/internal/cli.BuildDate={{.Date}}

archives:
  - id: default
    builds:
      - writ
      - lore
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: NobleFactor
    name: devlore-cli
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"
  header: |
    ## DevLore CLI v{{.Version}}

    ### Installation

    ```bash
    curl -sSL https://devlore.noblefactor.com/install.sh | bash
    ```

    Or download the appropriate archive below.
  extra_files:
    - glob: ./dist/Portfile
      name_template: Portfile

# Linux packages (deb/rpm)
nfpms:
  - id: devlore-cli
    package_name: devlore-cli
    vendor: NobleFactor
    homepage: https://devlore.noblefactor.com
    maintainer: NobleFactor <support@noblefactor.com>
    description: DevLore CLI - writ and lore tools for documentation generation
    license: Apache-2.0
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: LICENSE
        dst: /usr/share/doc/devlore-cli/LICENSE
      - src: README.md
        dst: /usr/share/doc/devlore-cli/README.md

# Homebrew formula (generates but does not publish)
brews:
  - repository:
      owner: NobleFactor
      name: homebrew-tap
    skip_upload: true
    directory: Formula
    homepage: https://devlore.noblefactor.com
    description: DevLore CLI - writ and lore tools
    license: Apache-2.0
    install: |
      bin.install "writ"
      bin.install "lore"

# Winget manifest (generates but does not publish)
winget:
  - publisher: NobleFactor
    publisher_url: https://noblefactor.com
    short_description: DevLore CLI tools
    license: Apache-2.0
    skip_upload: true
    repository:
      owner: NobleFactor
      name: winget-pkgs
