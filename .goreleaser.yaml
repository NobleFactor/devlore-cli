# GoReleaser configuration for devlore-cli
# https://goreleaser.com

version: 2

project_name: devlore-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: writ
    binary: writ
    main: ./cmd/writ
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/NobleFactor/devlore-cli/internal/cli.Version={{.Version}}
      - -X github.com/NobleFactor/devlore-cli/internal/cli.Commit={{.ShortCommit}}
      - -X github.com/NobleFactor/devlore-cli/internal/cli.BuildDate={{.Date}}

  - id: lore
    binary: lore
    main: ./cmd/lore
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/NobleFactor/devlore-cli/internal/cli.Version={{.Version}}
      - -X github.com/NobleFactor/devlore-cli/internal/cli.Commit={{.ShortCommit}}
      - -X github.com/NobleFactor/devlore-cli/internal/cli.BuildDate={{.Date}}

archives:
  - id: default
    builds:
      - writ
      - lore
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: NobleFactor
    name: devlore-cli
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"
  header: |
    ## DevLore CLI v{{.Version}}

    ### Installation

    ```bash
    curl -sSL https://devlore.noblefactor.com/install.sh | bash
    ```

    Or download the appropriate archive below.

