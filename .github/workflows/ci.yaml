# SPDX-License-Identifier: SSPL-1.0
name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Check go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Validate guide frontmatter
        run: ./scripts/Test-GuideFrontmatter.sh

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Cyclomatic complexity
        run: |
          go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
          VIOLATIONS=$(gocyclo -over 19 ./... | grep -v '_test\.go' || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "$VIOLATIONS"
            echo "::error::Functions with cyclomatic complexity > 19 detected (excluding tests)"
            exit 1
          fi

      - name: Lint Go
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Test
        run: go test ./... -timeout 60s

      - name: Shell lint
        run: |
          go install mvdan.cc/sh/v3/cmd/shfmt@latest
          .github/scripts/shell-lint.sh
