# SPDX-License-Identifier: SSPL-1.0
name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Check go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Validate guide frontmatter
        run: ./scripts/Test-GuideFrontmatter.sh

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Clone noblefactor-ops
        uses: actions/checkout@v4
        with:
          repository: NobleFactor/noblefactor-ops
          path: noblefactor-ops

      - name: Install lint tools
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin
          go install mvdan.cc/sh/v3/cmd/shfmt@latest
          sudo apt-get update && sudo apt-get install -y shellcheck
          golangci-lint version

      - name: Lint Go
        run: |
          cd noblefactor-ops
          go run ./cmd/star lint go --path=${{ github.workspace }}/...

      - name: Test
        run: go test ./... -timeout 60s

      - name: Lint Shell
        run: |
          cd noblefactor-ops
          go run ./cmd/star lint shell --path=${{ github.workspace }}

      - name: Code metrics
        run: |
          go install github.com/boyter/scc/v3@latest
          scc .
