# SPDX-License-Identifier: SSPL-1.0
name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci-lint/golangci-lint-action@v6
        with:
          version: latest

      - name: Test
        run: go test ./... -timeout 60s
