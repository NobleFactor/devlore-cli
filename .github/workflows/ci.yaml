# SPDX-License-Identifier: SSPL-1.0
name: CI

on:
  push:
    branches:
      - develop
      - main
      - 'release/*'
  pull_request:
    branches:
      - develop
      - main
      - 'release/*'

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.NOBLEFACTOR_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.NOBLEFACTOR_AUTOMATION_APP_PRIVATE_KEY }}
          owner: NobleFactor
          repositories: noblefactor-ops

      - name: Clone noblefactor-ops
        uses: actions/checkout@v4
        with:
          repository: NobleFactor/noblefactor-ops
          path: noblefactor-ops
          token: ${{ steps.app-token.outputs.token }}

      - name: Check go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Validate guide frontmatter
        run: ./scripts/Test-GuideFrontmatter.sh

      - name: Build
        run: make build STAR_REPO=./noblefactor-ops

      - name: Vet
        run: make vet

      - name: Install lint tools
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin
          go install mvdan.cc/sh/v3/cmd/shfmt@latest
          sudo apt-get update && sudo apt-get install -y shellcheck
          golangci-lint version

      - name: Lint Go
        run: |
          cd noblefactor-ops
          go run ./cmd/star lint go --path=${{ github.workspace }}/...

      - name: Test
        run: make test-race STAR_REPO=./noblefactor-ops

      - name: Lint Shell
        run: |
          cd noblefactor-ops
          go run ./cmd/star lint shell --path=${{ github.workspace }}

      - name: Code metrics
        run: |
          go install github.com/boyter/scc/v3@latest
          scc .
