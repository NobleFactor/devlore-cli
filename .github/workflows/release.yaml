# Release workflow: builds binaries and syncs to website

name: Release

on:
  push:
    branches:
      - main
      - develop
      - 'release/*'
    tags:
      - 'v*'

permissions:
  contents: write

env:
  # Default version for non-tag builds
  DEVLORE_VERSION: v0.1.0-draft

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout devlore-cli
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            VERSION="v0.1.0-rc"
          else
            VERSION="${{ env.DEVLORE_VERSION }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build distribution
        run: make dist DEVLORE_VERSION=${{ steps.version.outputs.version }}

      - name: Create latest.txt
        run: echo "${{ steps.version.outputs.version }}" > dist/latest.txt

      - name: List artifacts
        run: ls -la dist/

      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: NobleFactor/devlore.noblefactor.com
          token: ${{ secrets.SITE_DEPLOY_TOKEN }}
          path: website

      - name: Sync to website
        run: |
          # Create releases directory
          mkdir -p website/public/releases

          # Copy install script
          cp install.sh website/public/install.sh

          # Copy distribution files
          cp dist/* website/public/releases/

          cd website
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Determine target branch based on source
          # main, release/*, tags → production (main)
          # develop → preview (develop)
          TARGET_BRANCH="develop"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.ref }}" == refs/heads/release/* ]] || [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TARGET_BRANCH="main"
          fi

          git checkout "$TARGET_BRANCH" || git checkout -b "$TARGET_BRANCH"

          # Stage files first, then check if there are changes
          git add public/install.sh public/releases/
          if git diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi

          git commit -m "Deploy devlore-cli ${{ steps.version.outputs.version }}

          Source: ${{ github.repository }}@${{ github.sha }}
          Ref: ${{ github.ref }}"
          git push origin "$TARGET_BRANCH"

      - name: Summary
        run: |
          echo "## Release Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Version: \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Source: \`${{ github.repository }}@${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Ref: \`${{ github.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -la dist/ >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # Create GitHub Release (only on tags, for future public releases)
  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
