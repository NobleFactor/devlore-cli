# Release workflow: builds binaries and creates GitHub releases

name: Release

on:
  push:
    branches:
      - main
      - develop
      - 'release/*'
    tags:
      - 'v*'

permissions:
  contents: write

env:
  # Default version for non-tag builds
  DEVLORE_VERSION: v0.1.0-draft

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout devlore-cli
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Determine version and release type
        id: version
        run: |
          # Per https://docs.github.com/en/rest/releases/releases:
          # - Full releases: visible via /releases/latest, install with default "latest"
          # - Prereleases: NOT in /releases/latest, requires explicit DEVLORE_VERSION
          # - Drafts: require push (write) access, not suitable for distribution
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            PRERELEASE="false"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            VERSION="v0.1.0-rc.$(date +%Y%m%d%H%M%S)"
            PRERELEASE="true"
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            BRANCH_NAME="${{ github.ref_name }}"
            VERSION="v${BRANCH_NAME#release/}-rc.$(date +%Y%m%d%H%M%S)"
            PRERELEASE="true"
          else
            # develop and other branches
            VERSION="v0.1.0-dev.$(date +%Y%m%d%H%M%S)"
            PRERELEASE="true"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION (prerelease: $PRERELEASE)"

      - name: Build distribution
        run: make dist DEVLORE_VERSION=${{ steps.version.outputs.version }}

      - name: List artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        # Per https://cli.github.com/manual/gh_release_create
        run: |
          RELEASE_ARGS=""
          if [[ "${{ steps.version.outputs.prerelease }}" == "true" ]]; then
            RELEASE_ARGS="--prerelease"
          fi

          gh release create "${{ steps.version.outputs.version }}" \
            --title "${{ steps.version.outputs.version }}" \
            --notes "Release ${{ steps.version.outputs.version }}

          Source: ${{ github.repository }}@${{ github.sha }}
          Ref: ${{ github.ref }}" \
            $RELEASE_ARGS \
            dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## GitHub Release Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Version: \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Prerelease: \`${{ steps.version.outputs.prerelease }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Source: \`${{ github.repository }}@${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.version.outputs.prerelease }}" == "true" ]]; then
            echo "Prerelease requires explicit version:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "curl -sSL https://devlore.noblefactor.com/install.sh | GITHUB_TOKEN=<token> DEVLORE_VERSION=${{ steps.version.outputs.version }} bash" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "Full release (default latest):" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "curl -sSL https://devlore.noblefactor.com/install.sh | GITHUB_TOKEN=<token> bash" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -la dist/ >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # Sync install script to website (keep website as distribution point for script only)
  # Creates a PR instead of pushing directly to respect branch protection rules
  sync-install-script:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout devlore-cli
        uses: actions/checkout@v4

      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: NobleFactor/devlore.noblefactor.com
          token: ${{ secrets.SITE_DEPLOY_TOKEN }}
          path: website

      - name: Sync install script to website
        run: |
          # Copy install script only (binaries come from GitHub releases)
          cp install.sh website/public/install.sh

          cd website
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Determine target branch
          TARGET_BRANCH="develop"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TARGET_BRANCH="main"
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            TARGET_BRANCH="${{ github.ref_name }}"
          fi

          git checkout "$TARGET_BRANCH" || git checkout -b "$TARGET_BRANCH"

          # Check if there are changes
          git add public/install.sh
          if git diff --cached --quiet; then
            echo "No changes to install script"
            exit 0
          fi

          # Create a PR branch instead of pushing directly (respects branch protection)
          PR_BRANCH="sync-install-script-${{ github.sha }}"
          git checkout -b "$PR_BRANCH"

          git commit -m "Update install script

          Source: ${{ github.repository }}@${{ github.sha }}
          Ref: ${{ github.ref }}"
          git push origin "$PR_BRANCH"

          # Create PR using gh CLI
          # Per https://cli.github.com/manual/gh_pr_create
          gh pr create \
            --repo NobleFactor/devlore.noblefactor.com \
            --base "$TARGET_BRANCH" \
            --head "$PR_BRANCH" \
            --title "Update install script from devlore-cli" \
            --body "Automated sync of install.sh from devlore-cli.

          Source: ${{ github.repository }}@${{ github.sha }}
          Ref: ${{ github.ref }}"
        env:
          GH_TOKEN: ${{ secrets.SITE_DEPLOY_TOKEN }}
