name: Sync install.sh to Website

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'install.sh'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout devlore-cli
        uses: actions/checkout@v4
        with:
          path: devlore-cli

      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: NobleFactor/devlore.noblefactor.com
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          path: website

      - name: Check for changes
        id: diff
        run: |
          if diff -q devlore-cli/install.sh website/public/install.sh > /dev/null 2>&1; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Copy install.sh
        if: steps.diff.outputs.changed == 'true'
        run: |
          cp devlore-cli/install.sh website/public/install.sh

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          path: website
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          commit-message: "Sync install.sh from devlore-cli"
          title: "Sync install.sh from devlore-cli"
          body: |
            Automated sync of `install.sh` from [devlore-cli](https://github.com/NobleFactor/devlore-cli).

            Triggered by: ${{ github.event.head_commit.message || 'manual workflow dispatch' }}
            Source commit: ${{ github.sha }}
          branch: sync-install-script
          delete-branch: true
          base: main
