# SPDX-License-Identifier: SSPL-1.0
# Sync knowledge base to devlore-registry when source code changes.
# This keeps the LLM context accurate for package generation and migrations.
name: Sync Knowledge Base

on:
  push:
    branches:
      - develop
      - main
      - 'release/*'
  pull_request:
    branches:
      - develop
      - main
      - 'release/*'

jobs:
  sync-knowledge:
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.NOBLEFACTOR_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.NOBLEFACTOR_AUTOMATION_APP_PRIVATE_KEY }}
          owner: NobleFactor
          repositories: noblefactor-ops,devlore-registry

      - name: Checkout devlore-cli
        uses: actions/checkout@v4
        with:
          path: devlore-cli

      - name: Checkout noblefactor-ops
        uses: actions/checkout@v4
        with:
          repository: NobleFactor/noblefactor-ops
          token: ${{ steps.app-token.outputs.token }}
          path: noblefactor-ops

      - name: Checkout devlore-registry
        uses: actions/checkout@v4
        with:
          repository: NobleFactor/devlore-registry
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}
          path: devlore-registry

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: noblefactor-ops/go.sum

      - name: Build star tool
        working-directory: noblefactor-ops
        run: go build -o star ./cmd/star

      - name: Build knowledge base
        working-directory: noblefactor-ops
        run: |
          ./star devlore-registry build knowledge \
            --domain all \
            --source_path ${{ github.workspace }}/devlore-cli \
            --registry_path ${{ github.workspace }}/devlore-registry

      - name: Validate knowledge (PR only)
        if: github.event_name == 'pull_request'
        working-directory: devlore-registry
        run: |
          # On PRs, just validate - don't push
          if git diff --quiet; then
            echo "No knowledge changes detected"
          else
            echo "Knowledge changes detected:"
            git diff --stat
            echo ""
            echo "These changes will be pushed when the PR is merged."
          fi

      - name: Commit and push to devlore-registry (push only)
        if: github.event_name == 'push'
        working-directory: devlore-registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if there are changes
          if git diff --quiet; then
            echo "No knowledge changes to commit"
            exit 0
          fi

          git add knowledge/
          git commit -m "chore: sync knowledge from devlore-cli@${{ github.sha }}"
          git push origin ${{ github.ref_name }}
