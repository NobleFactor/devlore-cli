# SPDX-License-Identifier: SSPL-1.0
# Extract knowledge base to devlore-registry when source code changes.
# This keeps the LLM context accurate for package generation and migrations.
name: Knowledge Extract

on:
  push:
    branches:
      - develop
      - main
      - 'release/*'
  pull_request:
    branches:
      - develop
      - main
      - 'release/*'

jobs:
  knowledge-extract:
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.NOBLEFACTOR_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.NOBLEFACTOR_AUTOMATION_APP_PRIVATE_KEY }}
          owner: NobleFactor
          repositories: devlore-registry

      - name: Checkout devlore-cli
        uses: actions/checkout@v4
        with:
          path: devlore-cli

      - name: Checkout devlore-registry
        uses: actions/checkout@v4
        with:
          repository: NobleFactor/devlore-registry
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}
          path: devlore-registry

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: devlore-cli/go.sum

      - name: Build star tool
        working-directory: devlore-cli
        run: make star

      - name: Build knowledge base
        working-directory: devlore-cli
        run: |
          ./build/star devlore knowledge extract \
            --domain all \
            --source ${{ github.workspace }}/devlore-cli \
            --target ${{ github.workspace }}/devlore-registry

      - name: Validate package schemas
        working-directory: devlore-cli
        run: |
          ./build/star devlore package validate \
            --target=${{ github.workspace }}/devlore-registry

      - name: Validate knowledge schemas
        working-directory: devlore-cli
        run: |
          ./build/star devlore knowledge validate \
            --target=${{ github.workspace }}/devlore-registry

      - name: Report knowledge changes (PR only)
        if: github.event_name == 'pull_request'
        working-directory: devlore-registry
        run: |
          if git diff --quiet; then
            echo "No knowledge changes detected"
          else
            echo "Knowledge changes detected:"
            git diff --stat
            echo ""
            echo "These changes will be pushed when the PR is merged."
          fi

      - name: Create PR to devlore-registry (push only)
        if: github.event_name == 'push'
        working-directory: devlore-registry
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if there are changes
          if git diff --quiet; then
            echo "No knowledge changes to commit"
            exit 0
          fi

          BRANCH="knowledge/sync-${GITHUB_SHA::7}"
          git checkout -b "$BRANCH"
          git add knowledge/
          git commit -m "chore: sync knowledge from devlore-cli@${{ github.sha }}"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --repo NobleFactor/devlore-registry \
            --title "Sync knowledge from devlore-cli@${GITHUB_SHA::7}" \
            --body "Automated knowledge sync from [devlore-cli@\`${GITHUB_SHA::7}\`](https://github.com/NobleFactor/devlore-cli/commit/${GITHUB_SHA})." \
            --base "${{ github.ref_name }}")
          echo "Created PR: $PR_URL"
          gh pr merge "$PR_URL" --repo NobleFactor/devlore-registry --squash --auto --delete-branch
