extension: com.noblefactor.devlore.Knowledge
description: Devlore knowledge management - extract, index, validate, sign, and build artifacts

commands:
  - name: devlore.knowledge.extract
    help: Extract knowledge artifacts from devlore-cli source
    implementation: commands/extract.star
    flags:
      - name: source
        type: string
        default: ""
        help: "Path to devlore-cli (default: ../devlore-cli)"
      - name: target
        type: string
        default: ""
        help: "Output root for knowledge artifacts (default: ../devlore-registry)"
      - name: domain
        type: string
        default: "all"
        help: "Knowledge domain: all, onboarding, or migration"

  - name: devlore.knowledge.build.modelfile
    help: Generate Ollama Modelfile from knowledge domain
    implementation: commands/build-modelfile.star
    flags:
      - name: target
        type: string
        default: ""
        help: "Knowledge root to read from and write Modelfile to (default: ../devlore-registry)"
      - name: domain
        type: string
        default: "all"
        help: "Domain: all, migration, onboarding"
      - name: model
        type: string
        default: "qwen3:8b"
        help: Base model for Modelfile

  - name: devlore.knowledge.index.domains
    help: Generate index.yaml for knowledge domains
    implementation: commands/index-domains.star
    flags:
      - name: target
        type: string
        default: ""
        help: "Knowledge root to read/write indexes (default: ../devlore-registry)"
      - name: dry_run
        type: string
        default: ""
        help: Show what would be done without writing files

  - name: devlore.knowledge.index.packages
    help: Generate index.yaml and cross-reference.yaml for lore packages
    implementation: commands/index-packages.star
    flags:
      - name: target
        type: string
        default: ""
        help: "Knowledge root to read/write package indexes (default: ../devlore-registry)"

  - name: devlore.knowledge.sign.index
    help: Generate and sign index.yaml
    implementation: commands/sign-index.star
    flags:
      - name: target
        type: string
        default: ""
        help: "Knowledge root to read/write (default: ../devlore-registry)"
      - name: env
        type: string
        default: "dev"
        help: "Environment: dev or prod"

  - name: devlore.knowledge.sign.package
    help: Sign a lore package with release key
    implementation: commands/sign-package.star
    flags:
      - name: target
        type: string
        default: ""
        help: "Knowledge root containing the package (default: ../devlore-registry)"
      - name: env
        type: string
        default: "dev"
        help: "Environment: dev or prod"

  - name: devlore.knowledge.validate
    help: Validate YAML files against JSON schemas
    implementation: commands/validate.star
    flags:
      - name: target
        type: string
        default: ""
        help: "Knowledge root to validate (default: ../devlore-registry)"
      - name: type
        type: string
        default: ""
        help: "Type filter (package, package.lifecycle, knowledge, etc.)"

  - name: devlore.knowledge.api
    help: Validate devlore-cli Starlark API contract and generate documentation
    implementation: commands/api.star
    flags:
      - name: source
        type: string
        required: true
        help: Path to devlore-cli repository
      - name: format
        type: string
        default: "markdown"
        help: "Output format: markdown, json, or yaml"
