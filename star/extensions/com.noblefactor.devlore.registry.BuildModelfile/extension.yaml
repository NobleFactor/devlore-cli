extension: com.noblefactor.devlore.registry.BuildModelfile
description: Generate Ollama Modelfile from knowledge domain

commands:
  - name: devlore-registry.build.modelfile
    help: Generate Ollama Modelfile from knowledge domain
    implementation: commands/build-ollama-modelfile.star
    flags:
      - name: domain
        type: string
        default: "all"
        help: "Domain: all, migration, onboarding"
      - name: model
        type: string
        default: "qwen3:8b"
        help: Base model for Modelfile
      - name: registry_path
        type: string
        default: ""
        help: "Path to devlore-registry (default: ../devlore-registry)"