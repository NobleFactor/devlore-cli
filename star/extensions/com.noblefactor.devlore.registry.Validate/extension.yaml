extension: com.noblefactor.devlore.registry.Validate
description: Validate YAML files against JSON schemas in devlore-registry

commands:
  - name: devlore-registry.validate
    help: Validate YAML files against JSON schemas in devlore-registry
    implementation: commands/validate.star
    flags:
      - name: path
        type: string
        default: "."
        help: Path to devlore-registry
      - name: type
        type: string
        default: ""
        help: "Type filter (package, package.lifecycle, knowledge, etc.)"