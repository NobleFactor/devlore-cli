extension: com.noblefactor.devlore.registry.SignIndex
description: Generate and sign index.yaml

commands:
  - name: devlore-registry.sign.index
    help: Generate and sign index.yaml
    implementation: commands/sign-index.star
    flags:
      - name: path
        type: string
        default: "."
        help: Path to devlore-registry
      - name: env
        type: string
        default: "dev"
        help: "Environment: dev or prod"