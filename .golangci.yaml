# SPDX-License-Identifier: MIT
# golangci-lint v2 configuration for NobleFactor Go projects
#
# Objectives:
#   - Low complexity (gocyclo <= 15, gocognit <= 20)
#   - No dead or unused code
#   - No redundant code
#   - Clean formatting
#
# Copy this file to any Go repo root.

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: none
  enable:
    # Essential
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused

    # Complexity
    - gocyclo
    - gocognit

    # Dead/redundant code
    - unparam
    - unconvert

    # Code quality
    - gocritic
    - gosec
    - misspell
    - nilerr
    - bodyclose
    - durationcheck
    - errorlint
    - noctx

    # Style
    - revive
    - whitespace

  settings:
    gocyclo:
      min-complexity: 15

    gocognit:
      min-complexity: 20

    # NobleFactor Go style requires a blank line after every function signature
    # before the body. multi-func: true makes the whitespace linter enforce that
    # rule rather than flag the blank line as unnecessary.
    whitespace:
      multi-func: true

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - whyNoLint
        - hugeParam

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: var-declaration
        - name: var-naming

    gosec:
      excludes:
        - G104
        - G304

    misspell:
      locale: US

    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - io.Copy
        - (*os.File).Close
        - (io.Closer).Close

  exclusions:
    generated: lax
    rules:
      # Test files can have higher complexity
      - path: _test\.go
        linters:
          - gocyclo
          - gocognit
          - errcheck
          - gosec

      # Provider packages intentionally named after stdlib packages
      - path: pkg/op/provider/(json|yaml)/
        linters:
          - revive
        text: "var-naming.*conflict with Go standard library"

      # Generated files
      - path: \.pb\.go$
        linters:
          - all

    paths:
      - vendor
      - testdata
      - .git

output:
  formats:
    text:
      path: stdout
  print-issued-lines: true
  print-linter-name: true
  sort-results: true
